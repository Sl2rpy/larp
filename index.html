<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fsociety</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #1a0000, #000000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: red;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 80px;
      letter-spacing: 10px;
      color: red;
      text-shadow: 0 0 10px red, 0 0 30px darkred;
      margin: 0;
      transition: 0.3s;
    }

    h1:hover {
      transform: scale(1.1);
      text-shadow: 0 0 20px red, 0 0 60px darkred;
    }

    p {
      color: #aaa;
      margin-top: 10px;
      font-size: 18px;
    }

    .glow-line {
      width: 300px;
      height: 2px;
      background: red;
      margin: 20px auto;
      box-shadow: 0 0 10px red;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: black;
      border: 1px solid red;
      color: red;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: red;
      color: black;
      box-shadow: 0 0 20px red;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FSOCIETY</h1>
    <div class="glow-line"></div>
    <p>we are fsociety</p>
    <button onclick="alert('welcome to fsociety')">enter</button>
  </div>
</body>
</html>
